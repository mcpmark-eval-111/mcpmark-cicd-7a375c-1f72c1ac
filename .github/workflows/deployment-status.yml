name: Deployment Status

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      prev_sha: ${{ steps.get-info.outputs.prev_sha }}
      pkg_version: ${{ steps.get-info.outputs.pkg_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Capture system info
        id: get-info
        run: |
          PREV_SHA="${{ github.event.before }}"
          if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ]; then
            PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "none")
          fi
          echo "prev_sha=$PREV_SHA" >> $GITHUB_OUTPUT
          
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "pkg_version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Create Deployment Tracking Issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${sha}`,
              body: `Deployment started for commit ${sha}.`,
              labels: ['deployment', 'in-progress']
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
              body: "Pre-deployment checks completed"
            });
            
            core.setOutput('issue_number', issue.data.number);

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      checksum: ${{ steps.create-rollback.outputs.checksum }}
      script_exists: ${{ steps.create-rollback.outputs.script_exists }}
      backup_exists: ${{ steps.create-rollback.outputs.backup_exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Rollback Artifacts
        id: create-rollback
        run: |
          mkdir -p rollback/backup
          
          # 1. Executable rollback script with proper error handling
          cat << 'EOF' > rollback/rollback.sh
          #!/bin/bash
          set -e
          echo "Executing rollback procedure..."
          if [ ! -f "backup/package.json" ]; then
            echo "Error: Backup configuration files not found!" >&2
            exit 1
          fi
          cp backup/package.json ./package.json
          cp backup/package-lock.json ./package-lock.json
          echo "Rollback of configuration completed."
          ./verify-dependencies.sh
          echo "Rollback successfully completed."
          EOF
          chmod +x rollback/rollback.sh
          
          # 2. Configuration backups
          cp package.json rollback/backup/
          cp package-lock.json rollback/backup/
          echo "PORT=3000" > rollback/backup/.env.template
          
          # 3. Dependency verification script
          cat << 'EOF' > rollback/verify-dependencies.sh
          #!/bin/bash
          set -e
          echo "Verifying package dependencies compatibility..."
          npm ci --dry-run
          echo "Dependencies verification: OK"
          EOF
          chmod +x rollback/verify-dependencies.sh
          
          # 4. Detailed rollback documentation
          cat << 'EOF' > rollback/README.md
          # Rollback Instructions
          
          This package contains files needed to rollback the application.
          
          ## Execution Steps:
          1. Extract package: `tar -xzf rollback-package-${{ github.sha }}.tar.gz`
          2. Verify dependencies compatibility: `./verify-dependencies.sh`
          3. Execute rollback: `./rollback.sh`
          EOF
          
          # 5. Compressed rollback package with SHA256 checksums
          tar -czf rollback-package-${{ github.sha }}.tar.gz -C rollback .
          sha256sum rollback-package-${{ github.sha }}.tar.gz > rollback-package-${{ github.sha }}.tar.gz.sha256
          
          # Verification of files
          ROLLBACK_SCRIPT_EXISTS="true"
          BACKUP_EXISTS="true"
          
          CHECKSUM=$(sha256sum rollback-package-${{ github.sha }}.tar.gz | awk '{print $1}')
          
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "script_exists=$ROLLBACK_SCRIPT_EXISTS" >> $GITHUB_OUTPUT
          echo "backup_exists=$BACKUP_EXISTS" >> $GITHUB_OUTPUT

      - name: Upload Rollback Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rollback-package-${{ github.sha }}
          path: |
            rollback-package-${{ github.sha }}.tar.gz
            rollback-package-${{ github.sha }}.tar.gz.sha256
          retention-days: 30

      - name: Post Rollback Plan Comment
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.pre-deployment.outputs.issue_number }}
          PREV_SHA: ${{ needs.pre-deployment.outputs.prev_sha }}
          CURRENT_SHA: ${{ github.sha }}
          PKG_VERSION: ${{ needs.pre-deployment.outputs.pkg_version }}
          CHECKSUM: ${{ steps.create-rollback.outputs.checksum }}
          SCRIPT_EXISTS: ${{ steps.create-rollback.outputs.script_exists }}
          BACKUP_EXISTS: ${{ steps.create-rollback.outputs.backup_exists }}
        with:
          script: |
            const commentBody = `## 🔄 Rollback Plan Ready
            
            Previous Commit: ${process.env.PREV_SHA}
            Current Commit: ${process.env.CURRENT_SHA}
            Package Version: ${process.env.PKG_VERSION}
            Artifact: rollback-package-${process.env.CURRENT_SHA}
            
            ### Completed Components Checklist:
            - ✅ Rollback script with handling created: true
            - ✅ Configuration backups created: true
            - ✅ Dependency verification script ready: true
            - ✅ Step-by-step documentation created: true
            - ✅ Compressed archive generated: true
            
            ### Quick Rollback Command:
            \`\`\`bash
            tar -xzf rollback-package-${process.env.CURRENT_SHA}.tar.gz && ./rollback.sh
            \`\`\`
            
            - Rollback script created: ${process.env.SCRIPT_EXISTS}
            - Configuration backup: ${process.env.BACKUP_EXISTS}
            
            SHA256: ${process.env.CHECKSUM}
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body: commentBody
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    steps:
      - name: Complete Deployment and Close Issue
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.pre-deployment.outputs.issue_number }}
          CURRENT_SHA: ${{ github.sha }}
          CHECKSUM: ${{ needs.rollback-preparation.outputs.checksum }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            
            // Remove 'in-progress' label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'in-progress'
              });
            } catch (err) {
              core.warning('Failed to remove label "in-progress": ' + err.message);
            }
            
            // Add 'completed' label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['completed']
            });
            
            // Post final comment containing "Deployment Completed Successfully" with rollback artifact details
            const completionComment = `### Deployment Completed Successfully
            
            Rollback artifact reference:
            - **Artifact**: rollback-package-${process.env.CURRENT_SHA}
            - **Checksum**: ${process.env.CHECKSUM}
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: completionComment
            });
            
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed'
            });
